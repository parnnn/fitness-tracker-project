<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!--<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"> -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="wrapper">
        <form action="/submit" method="POST">
            <div id="wizard">
                <h4>Workout Log</h4>
            
                <section>
                    <div class="form-row">
                        <input type="text" name="user_id" class="form-control" placeholder="User ID (Leave blank if new)">
                    </div>

                    <div class="form-row">
                        <select name="acticity_type" class="form-control">
                            <option value="" disabled selected>Select Activity</option>
                            <option value="Running">Running</option>
                            <option value="Cycling">Cycling</option>
                            <option value="Swimming">Swimming</option>
                            <option value="Yoga">Yoga</option>
                        </select>
                    </div>

                    <div class="form-row">
                        <input type="number" name="duration" class="form-control" placeholder="Duration (Mins)" required>
                    </div>

                    <div class="form-row">
                        <input type="number" name="calories" class="form-control" placeholder="Calories Burned" required>
                    </div>

                    <div class="form-row">
                        <input type="number" name="heart_rate" class="form-control" placeholder="Avg Heart Rate (BPM)">
                    </div>

                    <button type="submit" class="btn-submit">Sync to AWS Cloud</button>
                </section>
            </div>
        </form>
    </div>
</body>    
</html>
